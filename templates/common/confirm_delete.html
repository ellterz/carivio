<h2>{{ page_title }}</h2>
<p>Are you sure you want to delete <strong>{{ car }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'cars:detail' car.pk %}" class="btn btn-secondary">
        Cancel
    </a>
</form>
