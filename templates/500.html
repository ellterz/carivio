{% extends "common/base.html" %}
{% load static %}

{% block title %}Server Error | Carivio{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/app.css' %}">
{% endblock %}

{% block content %}
<section class="page d-flex align-items-center justify-content-center text-center" style="min-height: 80vh;">
    <div>
        <h1 class="display-1 text-warning fw-bold">500</h1>
        <h2 class="mb-3">Something Went Wrong</h2>
        <p class="mb-4 text-muted">
            An unexpected error occurred on our end.<br>
            Please try again later.
        </p>
        <a href="{% url 'home' %}" class="btn btn-primary btn-lg">
            ← Back to Home
        </a>
    </div>
</section>
{% endblock %}
